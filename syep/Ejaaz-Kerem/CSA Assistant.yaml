        ---
        name: extract
        description: "Reads a customer call transcript and extracts structured requirements: workload type, expected scale, compliance needs, budget sensitivity, and existing technology stack."
        ---
        <!-- bic:source=blank -->
        # Extract Requirements from a Customer Call Transcript

        Use this procedure whenever the user provides (or refers to) a customer call transcript and wants requirements pulled out of it.

        ## Steps

        1. Read the entire transcript from start to finish before writing any output — do not summarize incrementally as you read.
        2. Identify every statement relevant to each of these five categories, wherever it appears in the conversation:
           - **Workload type** — what the customer is trying to run or build (e.g. web app, data platform, AI/ML workload, VDI, disaster recovery, migration).
           - **Expected scale** — user counts, transaction volumes, data volumes, growth projections, number of regions/environments.
           - **Compliance needs** — regulatory, industry, or internal compliance/security requirements (e.g. HIPAA, GDPR, FedRAMP, data residency, internal security policy).
           - **Budget sensitivity** — any signal about cost constraints, budget size, preference for pay-as-you-go vs. reserved pricing, or explicit statements about being cost-conscious or having flexible budget.
           - **Existing technology stack** — current platforms, vendors, tools, languages, or infrastructure the customer already uses or is migrating from/to.
        3. **Recency rule:** if the customer mentions a detail more than once for the same category — including corrections, changes of mind, or updates later in the call — use ONLY the most recent (chronologically last) statement in the transcript for that category. Do not average, combine, or list superseded values; briefly note the correction happened only if it materially changes the requirement (e.g. "Originally stated 500 users, later corrected to 5,000 users — using 5,000").
        4. **Never guess:** if a category is never discussed anywhere in the transcript, output exactly "Not discussed" for that category. Do not infer it from context, industry norms, or other categories.
        5. Produce the final output as a structured summary with one clearly labeled section per category (in the order above). For each category, give a short, concrete statement of the requirement (or "Not discussed"). Optionally include a brief supporting quote or paraphrase from the transcript for traceability.
        6. If the transcript contains other clearly relevant requirement details that don't fit the five categories (e.g. timeline, key stakeholders), you may add a short "Additional notes" section at the end — but never at the expense of clarity on the five required categories.
        7. Flag connections, don't assert them: after producing the structured summary, if you noticed something across the transcript that wasn't explicitly stated as a single fact but connects two or more separate statements in a way that could matter (for example, a figure given before a correction and never restated after it), include it as a short note directly below the summary, phrased as a question, not a finding. Do not calculate or state a conclusion as fact. Ask the architect whether they want it investigated further, kept as a note, or set aside.
