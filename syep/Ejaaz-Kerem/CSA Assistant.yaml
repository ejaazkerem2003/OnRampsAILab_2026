      content: |+
        ---
        name: waf
        description: Scores a draft Azure architecture against the Well-Architected Framework's five pillars (Reliability, Security, Cost Optimization, Operational Excellence, Performance Efficiency), with a short justification per pillar.
        ---
        <!-- bic:source=blank -->
        # Score a Draft Architecture Against the Well-Architected Framework

        Use this procedure whenever the user provides (or refers to) a draft architecture — typically the output of the Draft Architecture skill — and wants it scored against the Well-Architected Framework's five pillars.

        ## Steps

        1. Read the entire draft architecture before scoring, including its Design Tensions, Risks Noticed, and Open Items sections. Those sections are not optional context — they directly limit what you can confidently score.
        2. Score each pillar, in this order: **Reliability, Security, Cost Optimization, Operational Excellence, Performance Efficiency.** Use this four-level rating for each: **Not Addressed / Emerging / Adequate / Strong.** Do not use a numeric score — a single rough draft doesn't support that level of precision.
        3. Ground each pillar's judgment in its core design principles, since this skill doesn't yet use RAG or Azure Architecture Center grounding for deeper service-specific guidance:
           - **Reliability** — does the draft show resilience: failure handling, redundancy, recovery targets tied to the stated scale and workload type? A reliable design detects, withstands, and recovers from failure within an acceptable time.
           - **Security** — does the draft address identity and access control, data protection, and network segmentation tied to the stated compliance needs? Judge against a zero-trust baseline (verify explicitly, least-privilege access, assume breach).
           - **Cost Optimization** — are service choices tied to the stated budget sensitivity, with a clear rationale for tier/pricing-model choices? A cost-optimized workload isn't automatically a low-cost one; judge whether spend is justified against stated constraints, not whether it's cheap.
           - **Operational Excellence** — does the draft's Monitoring/Ops category define observability and standard operating practices, sized to the workload's actual complexity?
           - **Performance Efficiency** — does the draft's compute/storage/networking choices show a scaling strategy tied to the stated expected scale, rather than a fixed guess at capacity?
        4. For each pillar, cite the specific line(s) from the draft that support the rating. Never justify a rating using assumed best practice that isn't actually reflected in the draft.
        5. **Cap ratings honestly:** cap a pillar below "Strong" whenever there's a real gap bearing on it, whether that gap was already flagged upstream or you're noticing it for the first time while scoring. This includes: the category most relevant to the pillar was marked "Not addressed — no requirement provided" in the draft; the relevant area appears in the draft's Design Tensions, Risks Noticed, or Open Items; or you notice a gap yourself that isn't written down anywhere upstream (e.g. the draft never addresses deployment practices, or never gives the data tier a performance strategy). In every case, rate it "Not Addressed" or "Emerging" as appropriate, and say explicitly that the cap is because something is unresolved or missing, not because the architecture is weak.
        6. Never fabricate a justification to fill a pillar. If there isn't enough in the draft to rate a pillar at all, use "Not Addressed" and say why, rather than inferring from typical workloads of that type.
        7. Produce the output as a table: Pillar | Rating | Justification | Related open item, tension, or risk noticed (if any).
        8. End with a **Scoring Confidence** section: list every pillar whose rating was capped or set to "Not Addressed" because of an unresolved item, and ask the user directly whether they want to resolve those before treating the scorecard as final — the same pattern used in Extract Requirements and Draft Architecture. Do not silently present a low-confidence scorecard as complete.

