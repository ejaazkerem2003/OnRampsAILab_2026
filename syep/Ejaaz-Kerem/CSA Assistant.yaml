        ---
        name: draft
        description: Takes structured requirements (workload type, expected scale, compliance needs, budget sensitivity, existing technology stack) and proposes a rough first-draft Azure architecture, grounded strictly in what was provided.
        ---
        <!-- bic:source=blank -->
        # Draft Architecture from Structured Requirements

        Use this procedure whenever the user provides (or refers to) a structured requirements summary — typically the output of the Extract Requirements skill — and wants a first-draft Azure architecture proposed from it.

        ## Steps

        1. Read the entire structured requirements summary before writing any output, including any "Additional notes" or flagged connection questions from Extract Requirements. Treat items marked "Not discussed" as genuinely unresolved, not as gaps to fill with a default.
        2. Propose services only where a requirement supports the choice. Do not introduce services, patterns, or configurations that aren't traceable back to a specific stated requirement. This skill does not use RAG or Azure Architecture Center grounding yet, so stay with conservative, well-established services rather than reaching for a niche or newer offering that would normally need documentation to justify.
        3. Organize the draft into these categories, in this order:
           - **Compute** (e.g. App Service, AKS, Azure Functions, VMs)
           - **Storage** (e.g. Blob Storage, Azure SQL, Cosmos DB)
           - **Networking** (e.g. VNet, Front Door, Private Link)
           - **Security / Identity** (e.g. Entra ID, Key Vault, compliance-driven controls)
           - **Monitoring / Ops** (e.g. Azure Monitor, Log Analytics)
        4. For each category, name the specific service(s) chosen and state the exact requirement it's tied to (quote or closely paraphrase the relevant line from the requirements summary). If a category has no supporting requirement, write "Not addressed — no requirement provided" instead of filling it in with a typical or default configuration.
        5. **Flag tensions, don't resolve them:** if two or more *stated* requirements pull toward conflicting design choices (e.g. tight budget vs. a heavy compliance burden, or high scale vs. an existing stack that doesn't scale well), do not pick a side. List it under "Design Tensions" and ask the user directly what they want to do with it — the same pattern used in Extract Requirements for flagged connections. Never silently choose a "reasonable default" and move on. This section is only for conflicts between two things the customer actually said. It is not for risks the architecture itself surfaces, see step 6.
        6. **Flag risks the draft itself surfaces, don't design around them silently:** if the act of drafting reveals a risk nobody raised on the call — a single point of failure, a dependency with no stated failover or SLA, a scope boundary that could shrink or expand the design (e.g. a compliance boundary that a different vendor choice would change) — do not quietly design around it or leave it unmentioned. List it under "Risks Noticed" as a direct note to the user, phrased so it's clear this is something the draft is proactively raising, not something the customer discussed. Nothing conflicts here, unlike Design Tensions, this is the architecture surfacing something worth the architect's attention.
        7. Carry forward unresolved items: anything marked "Not discussed" in the requirements, or raised as a flagged question in Extract Requirements' output, stays unresolved here. List these under "Open Items." This section is for gaps that already existed upstream, not new risks noticed while drafting (those belong in step 6). Don't assume a standard configuration to close any of these gaps.
        8. End every draft with three closing sections, in this order:
           - **Design Tensions** — conflicts between stated requirements that need the user's input (if none, state "None identified.")
           - **Risks Noticed** — risks or gaps the draft itself surfaced during design that weren't discussed on the call (if none, state "None identified.")
           - **Open Items** — gaps carried over from the requirements summary that remain unresolved (if none, state "None identified.")
